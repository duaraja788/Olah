<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Olah — Cross-Chain Trade Desk (Solana • Sui • EVM)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #070a12;
      --bg2: #0b1020;
      --card: #0f162a;
      --card2: #121b33;
      --border: #233055;
      --text: #e7edf8;
      --muted: #95a3c6;
      --cyan: #00d4aa;
      --cyan2: #00a8cc;
      --violet: #c84ef6;
      --amber: #f5a623;
      --red: #ff4d6d;
      --shadow: 0 0 32px rgba(0, 212, 170, 0.10);
      --radius: 14px;
      --radius-sm: 10px;
      --mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: "Outfit", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      --g1: linear-gradient(135deg, #00d4aa 0%, #00a8cc 55%, #2dd4ff 100%);
      --g2: linear-gradient(135deg, #c84ef6 0%, #6c5ce7 55%, #2dd4ff 100%);
      --g3: linear-gradient(135deg, #f5a623 0%, #ff4d6d 60%, #c84ef6 100%);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: var(--sans);
      background: radial-gradient(900px 700px at 20% 10%, rgba(0, 212, 170, 0.08), transparent 60%),
                  radial-gradient(900px 700px at 80% 15%, rgba(200, 78, 246, 0.08), transparent 60%),
                  radial-gradient(1200px 900px at 50% 90%, rgba(245, 166, 35, 0.06), transparent 60%),
                  var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    .noise {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      z-index: 0;
    }

    .grid {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.14;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 64px 64px;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      padding: 1rem 2rem;
      border-bottom: 1px solid rgba(35, 48, 85, 0.7);
      background: rgba(7, 10, 18, 0.78);
      backdrop-filter: blur(14px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .mark {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: var(--g2);
      box-shadow: 0 0 22px rgba(200, 78, 246, 0.25);
      position: relative;
      overflow: hidden;
    }

    .mark::before {
      content: "";
      position: absolute;
      inset: -40%;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.35), transparent 50%);
      transform: rotate(18deg);
    }

    .brand h1 {
      font-size: 1.35rem;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    .brand h1 span {
      background: var(--g1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .sub {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 0.15rem;
    }

    nav {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    nav a {
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--muted);
      text-decoration: none;
      padding: 0.55rem 0.9rem;
      border-radius: 999px;
      border: 1px solid transparent;
      transition: background 0.18s, border-color 0.18s, color 0.18s;
    }

    nav a:hover, nav a.active {
      background: rgba(0, 212, 170, 0.08);
      border-color: rgba(0, 212, 170, 0.25);
      color: var(--cyan);
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .btn {
      font-family: var(--mono);
      font-size: 0.82rem;
      padding: 0.7rem 1.05rem;
      border-radius: 12px;
      cursor: pointer;
      border: 1px solid rgba(35, 48, 85, 0.9);
      background: rgba(15, 22, 42, 0.6);
      color: var(--text);
      transition: transform 0.15s, box-shadow 0.2s, border-color 0.2s;
    }

    .btn:hover {
      transform: translateY(-1px);
      border-color: rgba(0, 212, 170, 0.35);
      box-shadow: var(--shadow);
    }

    .btn.primary {
      background: var(--g1);
      border: 1px solid rgba(0, 212, 170, 0.35);
      color: #051018;
      font-weight: 700;
    }

    .btn.primary:hover {
      box-shadow: 0 0 30px rgba(0, 212, 170, 0.22);
      border-color: rgba(0, 212, 170, 0.55);
    }

    main {
      position: relative;
      z-index: 1;
      max-width: 1220px;
      margin: 0 auto;
      padding: 2.2rem 2rem 4rem;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 1.2rem;
      align-items: stretch;
      margin-top: 0.5rem;
    }

    @media (max-width: 980px) {
      .hero { grid-template-columns: 1fr; }
      header { padding: 1rem 1.25rem; }
      main { padding: 1.6rem 1.25rem 3.4rem; }
    }

    .hero-left {
      background: linear-gradient(180deg, rgba(15, 22, 42, 0.9), rgba(11, 16, 32, 0.9));
      border: 1px solid rgba(35, 48, 85, 0.9);
      border-radius: var(--radius);
      padding: 1.6rem 1.6rem 1.35rem;
      overflow: hidden;
      position: relative;
    }

    .hero-left::after {
      content: "";
      position: absolute;
      inset: -20%;
      background: radial-gradient(circle at 20% 20%, rgba(0, 212, 170, 0.10), transparent 55%),
                  radial-gradient(circle at 75% 25%, rgba(200, 78, 246, 0.10), transparent 55%);
      filter: blur(2px);
      pointer-events: none;
    }

    .hero-left .kicker {
      font-family: var(--mono);
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-size: 0.78rem;
    }

    .hero-left h2 {
      font-size: clamp(1.7rem, 3.2vw, 2.5rem);
      margin-top: 0.55rem;
      letter-spacing: -0.03em;
      line-height: 1.1;
    }

    .hero-left h2 strong {
      background: var(--g2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-left p {
      margin-top: 0.85rem;
      color: var(--muted);
      max-width: 62ch;
      line-height: 1.65;
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.55rem;
      margin-top: 1.2rem;
      position: relative;
      z-index: 1;
    }

    .pill {
      font-family: var(--mono);
      font-size: 0.76rem;
      padding: 0.42rem 0.7rem;
      border-radius: 999px;
      border: 1px solid rgba(35, 48, 85, 0.9);
      color: var(--muted);
      background: rgba(7, 10, 18, 0.35);
    }

    .pill b {
      color: var(--text);
      font-weight: 700;
    }

    .hero-cta {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      flex-wrap: wrap;
      margin-top: 1.25rem;
      position: relative;
      z-index: 1;
    }

    .hero-right {
      background: linear-gradient(180deg, rgba(15, 22, 42, 0.9), rgba(18, 27, 51, 0.92));
      border: 1px solid rgba(35, 48, 85, 0.9);
      border-radius: var(--radius);
      padding: 1.35rem;
    }

    .panel-title {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 0.9rem;
    }

    .panel-title h3 {
      font-size: 1.05rem;
      letter-spacing: -0.01em;
    }

    .panel-title .hint {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--muted);
    }

    .kv {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.65rem 0.9rem;
      font-family: var(--mono);
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 0.4rem;
    }

    .kv .k { color: var(--muted); }
    .kv .v { color: var(--text); text-align: right; }

    .divider {
      height: 1px;
      background: rgba(35, 48, 85, 0.8);
      margin: 1rem 0;
    }

    .section {
      margin-top: 1.6rem;
    }

    .section h3 {
      font-size: 1.25rem;
      letter-spacing: -0.02em;
      margin-bottom: 0.7rem;
    }

    .section p {
      color: var(--muted);
      line-height: 1.65;
      max-width: 80ch;
    }

    .grid2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-top: 1rem;
    }

    @media (max-width: 980px) {
      .grid2 { grid-template-columns: 1fr; }
    }

    .card {
      background: rgba(15, 22, 42, 0.85);
      border: 1px solid rgba(35, 48, 85, 0.9);
      border-radius: var(--radius);
      padding: 1.2rem 1.2rem 1.1rem;
      overflow: hidden;
      position: relative;
    }

    .card:hover {
      border-color: rgba(0, 212, 170, 0.30);
      box-shadow: 0 0 32px rgba(0, 212, 170, 0.08);
    }

    .card .tag {
      font-family: var(--mono);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .card h4 {
      margin-top: 0.5rem;
      font-size: 1.0rem;
      letter-spacing: -0.01em;
    }

    .card p {
      margin-top: 0.55rem;
      font-size: 0.92rem;
      color: var(--muted);
    }

    .table-wrap {
      margin-top: 1rem;
      background: rgba(15, 22, 42, 0.85);
      border: 1px solid rgba(35, 48, 85, 0.9);
      border-radius: var(--radius);
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 820px;
    }

    th, td {
      padding: 0.85rem 1rem;
      border-bottom: 1px solid rgba(35, 48, 85, 0.7);
      text-align: left;
      font-family: var(--mono);
      font-size: 0.82rem;
      white-space: nowrap;
    }

    th {
      color: var(--muted);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      background: rgba(11, 16, 32, 0.6);
      position: sticky;
      top: 0;
      z-index: 2;
    }

    tr:hover td { background: rgba(0, 212, 170, 0.06); }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.25rem 0.55rem;
      border-radius: 999px;
      border: 1px solid rgba(35, 48, 85, 0.9);
      font-size: 0.74rem;
      color: var(--muted);
      background: rgba(7, 10, 18, 0.3);
    }

    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 10px rgba(0, 212, 170, 0.25);
    }

    .dot.violet { background: var(--violet); box-shadow: 0 0 10px rgba(200, 78, 246, 0.25); }
    .dot.amber { background: var(--amber); box-shadow: 0 0 10px rgba(245, 166, 35, 0.25); }
    .dot.red { background: var(--red); box-shadow: 0 0 10px rgba(255, 77, 109, 0.25); }

    .mono { font-family: var(--mono); }
    .muted { color: var(--muted); }
